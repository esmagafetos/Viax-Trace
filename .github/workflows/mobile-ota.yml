name: Mobile OTA (Deprecated)

# Replaced by Flutter native builds.
# - Android: .github/workflows/mobile-release.yml (Flutter Gradle, Ubuntu)
# - iOS:     .github/workflows/mobile-ios.yml     (Flutter Xcode, macOS, --no-codesign)
#
# This workflow is intentionally manual-only and a no-op so it does not
# trigger on pushes. Kept as a stub for historical references.

on:
  workflow_dispatch:

jobs:
  notice:
    name: OTA workflow removed
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::warning::EAS Update was removed. The mobile app is now Flutter."
          echo "Trigger 'Mobile Release (Flutter Android APK)' or 'Mobile Release (Flutter iOS — unsigned)' instead."
