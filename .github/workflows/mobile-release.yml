name: Mobile Release (Android APK)

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/viax-mobile/**'
      - '.github/workflows/mobile-release.yml'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile (preview or production)'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - production

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Release Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: artifacts/viax-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile

      - name: Typecheck mobile
        run: pnpm run typecheck

      - name: Resolve build metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_TS=$(date -u +%Y%m%d-%H%M%S)
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          VERSION=$(node -p "require('./package.json').version")
          TAG="mobile-v${VERSION}-${BUILD_TS}-${SHORT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "profile=${PROFILE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build APK on EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -o pipefail
          eas build \
            --platform android \
            --profile "${{ steps.meta.outputs.profile }}" \
            --non-interactive \
            --json \
            --wait 2>&1 | tee build-output.json
          echo "---- last 5 lines of build-output.json ----"
          tail -n 5 build-output.json

      - name: Download APK artifact
        run: |
          APK_URL=$(node -e "
            const fs = require('fs');
            const raw = fs.readFileSync('build-output.json','utf8').trim();
            const start = raw.indexOf('[');
            const end = raw.lastIndexOf(']');
            if (start === -1 || end === -1) { console.error('no JSON array in output'); process.exit(1); }
            const builds = JSON.parse(raw.slice(start, end + 1));
            const url = builds[0] && builds[0].artifacts && builds[0].artifacts.buildUrl;
            if (!url) { console.error('no buildUrl in EAS response'); process.exit(1); }
            console.log(url);
          ")
          echo "APK URL: $APK_URL"
          mkdir -p out
          curl -fL "$APK_URL" -o "out/viax-trace-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_sha }}.apk"
          ls -lh out

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ViaX:Trace Mobile ${{ steps.meta.outputs.tag }}
          body: |
            ## ViaX:Trace Mobile — Android APK

            Build automatizado via EAS Build.

            - **Versão**: `${{ steps.meta.outputs.version }}`
            - **Commit**: `${{ github.sha }}`
            - **Trigger**: ${{ github.event_name }}
            - **Profile**: `${{ steps.meta.outputs.profile }}`

            ### Instalação

            1. Baixe o `.apk` abaixo no seu Android.
            2. Em **Configurações → Segurança**, autorize a instalação de fontes desconhecidas.
            3. Toque no APK baixado para instalar.
            4. Ao abrir o app, configure a URL do seu servidor ViaX:Trace
               (rodando localmente via Termux ou em outro host) na tela inicial.
          files: artifacts/viax-mobile/out/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
