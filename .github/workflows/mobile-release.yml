name: Mobile Release (Flutter Android APK)

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/viax-mobile/**'
      - '.github/workflows/mobile-release.yml'
  workflow_dispatch:
    inputs:
      api_base:
        description: 'API base URL baked into the APK (defaults to repo secret API_BASE or https://viax-scout.replit.app)'
        required: false
        default: ''
        type: string
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: ''
        type: string

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Flutter Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: artifacts/viax-mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Regenerate Android/iOS platform scaffolding
        run: |
          # Pubspec already exists; this fills in android/, ios/, etc. without touching lib/.
          flutter create --org com.viax --project-name viax_scout --platforms=android,ios .
          # Ensure release signing falls back to debug keystore so unsigned CI builds work.
          ls -la android/

      - name: Resolve API_BASE
        id: api
        run: |
          INPUT_BASE="${{ github.event.inputs.api_base }}"
          SECRET_BASE="${{ secrets.API_BASE }}"
          if [ -n "$INPUT_BASE" ]; then
            echo "value=$INPUT_BASE" >> "$GITHUB_OUTPUT"
          elif [ -n "$SECRET_BASE" ]; then
            echo "value=$SECRET_BASE" >> "$GITHUB_OUTPUT"
          else
            echo "value=https://viax-scout.replit.app" >> "$GITHUB_OUTPUT"
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze (non-blocking)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=API_BASE=${{ steps.api.outputs.value }}
          ls -lh build/app/outputs/flutter-apk/

      - name: Build split-per-ABI APKs
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=API_BASE=${{ steps.api.outputs.value }}
          ls -lh build/app/outputs/flutter-apk/

      - name: Compute version & tag
        id: meta
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          SHA=${GITHUB_SHA::7}
          TAG="mobile-v${VERSION}-${SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Stage artifacts
        run: |
          mkdir -p ../../release-artifacts
          cp build/app/outputs/flutter-apk/app-release.apk \
            "../../release-artifacts/viax-scout-${{ steps.meta.outputs.version }}-universal.apk"
          for abi in arm64-v8a armeabi-v7a x86_64; do
            f="build/app/outputs/flutter-apk/app-${abi}-release.apk"
            if [ -f "$f" ]; then
              cp "$f" "../../release-artifacts/viax-scout-${{ steps.meta.outputs.version }}-${abi}.apk"
            fi
          done
          ls -lh ../../release-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: viax-scout-android-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.sha }}
          path: release-artifacts/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ViaX:Scout ${{ steps.meta.outputs.version }} (Android)
          body: |
            **Flutter Android build** — generated automatically from commit `${{ steps.meta.outputs.sha }}`.

            **API base:** `${{ steps.api.outputs.value }}`

            ${{ github.event.inputs.release_notes }}

            ## Install
            Download `viax-scout-${{ steps.meta.outputs.version }}-universal.apk` and install on your Android device.
            (Enable "Install from unknown sources" if needed.)
          files: release-artifacts/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
