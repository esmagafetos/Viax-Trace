# =============================================================================
#  ViaX:Trace — Render Blueprint
#  https://render.com/docs/blueprint-spec
#
#  Provisiona:
#    - PostgreSQL gerenciado (free)
#    - Web Service (Docker) rodando o api-server
#
#  Como subir:
#    1. Faça push deste repo para o GitHub.
#    2. No Render: New + → Blueprint → selecione este repositório.
#    3. Render lê este arquivo, cria o banco e o serviço web.
#    4. Aguarde o deploy concluir (~5-10 min).
#    5. Cole a URL pública da API (ex: https://viax-trace-api.onrender.com)
#       no app mobile em "Configurar servidor".
#
#  Sobre o geocodebr (CNEFE/IBGE):
#    O microserviço NÃO é provisionado pelo blueprint para manter o stack
#    100% no plano free do Render. Ele é completamente opcional — Photon,
#    Overpass e Nominatim já cobrem a maioria dos endereços brasileiros.
#
#    Se você quiser ativar o geocodebr (precisão extra para interior):
#      a) Suba o microserviço por conta própria (Docker, VPS, Cloudflare
#         Tunnel, ngrok, ou qualquer host capaz de rodar a imagem em
#         artifacts/geocodebr-service/).
#      b) Cole a URL pública dele em "Configurações → Instâncias →
#         GeocodeR BR" no app web ou mobile (per-user).
#
#    Como fallback global, a API ainda respeita a variável GEOCODEBR_URL
#    se você quiser definir uma URL padrão para todos os usuários.
#
#  Variáveis opcionais (configure no painel após o primeiro deploy):
#    - GOOGLE_MAPS_API_KEY  → habilita modo "googlemaps"
#    - GEOCODEBR_URL        → URL global do geocodebr (sobrescrita por per-user)
#    - GEOCODEBR_HF_TOKEN   → Bearer do Space privado no Hugging Face
#    - GEOCODEBR_API_KEY    → X-API-Key do Plumber (gateway interno do Space)
#    - OPENAI_API_KEY       → parser via IA
#    - ANTHROPIC_API_KEY    → parser via IA
#    - GOOGLE_AI_API_KEY    → parser via IA
# =============================================================================

databases:
  - name: viax-trace-db
    plan: free
    databaseName: viax_trace
    user: viax_trace
    postgresMajorVersion: "16"

services:
  - type: web
    name: viax-trace-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: viax-trace-db
          property: connectionString
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GEOCODEBR_URL
        sync: false
      - key: GEOCODEBR_HF_TOKEN
        sync: false
      - key: GEOCODEBR_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
