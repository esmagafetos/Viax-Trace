# =============================================================================
#  ViaX:Trace — Render Blueprint
#  https://render.com/docs/blueprint-spec
#
#  Provisiona:
#    - PostgreSQL gerenciado (free)
#    - Web Service (Docker) rodando o api-server
#    - Web Service (Docker) rodando o microserviço geocodebr (R/CNEFE)
#      → GEOCODEBR_URL é injetado automaticamente no api-server
#
#  Como subir:
#    1. Faça push deste repo para o GitHub.
#    2. No Render: New + → Blueprint → selecione este repositório.
#    3. Render lê este arquivo, cria o banco e os serviços web.
#    4. Aguarde o deploy concluir (~5-10 min para a API; o geocodebr
#       leva ~10-15 min na primeira build por causa dos pacotes R espaciais).
#    5. Cole a URL pública da API (ex: https://viax-trace-api.onrender.com)
#       no app mobile em "Configurar servidor".
#
#  Notas:
#    - geocodebr no plano "free" perde o cache CNEFE entre deploys e dorme
#      após inatividade (cold start lento). Para uso em produção, suba para
#      um plano pago e adicione um disco persistente em /root/.cache.
#
#  Variáveis opcionais (configure no painel após o primeiro deploy):
#    - GOOGLE_MAPS_API_KEY  → habilita modo "googlemaps"
#    - OPENAI_API_KEY       → parser via IA
#    - ANTHROPIC_API_KEY    → parser via IA
#    - GOOGLE_AI_API_KEY    → parser via IA
# =============================================================================

databases:
  - name: viax-trace-db
    plan: free
    databaseName: viax_trace
    user: viax_trace
    postgresMajorVersion: "16"

services:
  - type: web
    name: viax-trace-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: viax-trace-db
          property: connectionString
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GEOCODEBR_URL
        value: http://viax-trace-geocodebr:8002
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false

  # ---------------------------------------------------------------------------
  # geocodebr — serviço privado (não exposto publicamente)
  # Acessível apenas por outros serviços do blueprint via DNS interno do Render
  # em http://viax-trace-geocodebr:8002.
  # ---------------------------------------------------------------------------
  - type: pserv
    name: viax-trace-geocodebr
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./artifacts/geocodebr-service/Dockerfile
    dockerContext: ./artifacts/geocodebr-service
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8002"
