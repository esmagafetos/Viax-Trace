version: "3.9"

# =============================================================================
#  ViaX: System — Docker Compose
#  https://github.com/ViaXTrace/Viax-Trace
#
#  Iniciar:  docker compose up -d
#  Parar:    docker compose down
#  Logs:     docker compose logs -f
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: viax_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: viax_system
      POSTGRES_USER: viax
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-viax_secure_pass}
    volumes:
      - viax_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viax -d viax_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: viax_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://viax:${POSTGRES_PASSWORD:-viax_secure_pass}@db:5432/viax_system
      SESSION_SECRET: ${SESSION_SECRET:-change_this_in_production_min_32_chars}
      NODE_ENV: production
      PORT: 8080
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: viax_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: 3000
      BASE_PATH: /
    ports:
      - "3000:3000"

volumes:
  viax_pgdata:
    driver: local
