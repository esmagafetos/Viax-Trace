<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf9f6"/>
      <stop offset="100%" stop-color="#eeecea"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.78" r="0.55">
      <stop offset="0%" stop-color="#d4521a" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#d4521a" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#d4521a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="curve" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1917"/>
      <stop offset="100%" stop-color="#3a352e"/>
    </linearGradient>
    <linearGradient id="pin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8703a"/>
      <stop offset="100%" stop-color="#c43d10"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="offset"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="224" fill="url(#glow)"/>

  <g transform="translate(160, 160) scale(25.6)">
    <path d="M7 7 C 7 7, 7 16, 14 18 C 20 20, 21 21, 21 21"
          stroke="url(#curve)" stroke-width="2.6"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="7" cy="7" r="3" fill="url(#curve)"/>
    <circle cx="7" cy="7" r="1.1" fill="#faf9f6" opacity="0.85"/>
    <g filter="url(#shadow)">
      <circle cx="21" cy="21" r="5.2" fill="url(#pin)"/>
      <circle cx="21" cy="21" r="2.1" fill="#ffffff"/>
    </g>
  </g>
</svg>
